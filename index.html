<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lanyio.com - 个人主页</title>
    <style>
        /* 全局重置 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 背景与主体 */
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(120deg, #1fa2ff, #4678e0, #764ba2);
            background-size: 300% 300%;
            animation: bgAnim 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        /* 背景渐变动画 */
        @keyframes bgAnim {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 卡片容器 */
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 3.5rem 3rem;
            border-radius: 22px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
            max-width: 500px;
            width: 100%;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-6px); }

        /* 装饰光斑 */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.8s ease;
        }

        .card:hover::before { left: 100%; }

        /* 标题 */
        .title {
            font-size: 2.4rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* 描述文本 */
        .desc {
            font-size: 1.15rem;
            opacity: 0.9;
            margin-bottom: 2.2rem;
            line-height: 1.6;
        }

        /* 链接按钮 */
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-item {
            display: block;
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .link-item::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
            z-index: -1;
        }

        .link-item:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }

        .link-item:hover::after { transform: scaleX(1); }

        /* 页脚 */
        .footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="title">欢迎来到 lanyio.com</h1>
        <p class="desc">个人站点</p>
        
        <div class="links">
            <a href="#" class="link-item">📁 我的项目</a>
            <a href="#" class="link-item">✍️ 个人日志</a>
            <!-- 下面这行就是你的联系方式，直接显示 -->
            <a href="mailto:zsunlei@outlook.com" class="link-item">📞 电话：15556551312</a>
        </div>
        
        <div class="footer">© 2026 lanyio.com | </div>
    </div>
</body>
</html>
